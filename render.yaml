services:
  - type: web
    name: lmui-prom-tickets-server
    env: node
    branch: main
    buildCommand: "cd server && npm install"
    startCommand: "cd server && npm start"
    envVars:
      - key: FLW_SECRET_KEY
        fromSecret: FLW_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: lmui-prom-db
          property: connectionString

databases:
  - name: lmui-prom-db
    plan: free
    region: oregon
